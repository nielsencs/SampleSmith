name: Build Windows app

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "samplesmith.py"
      - "samplesmith_app/**"
      - "requirements.txt"
      - "requirements-build.txt"
      - "SampleSmith.spec"
      - ".github/workflows/build-windows.yml"

jobs:
  windows-exe:
    name: Windows standalone app
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Syntax check
        run: python -c "import pathlib, py_compile; [py_compile.compile(str(path), doraise=True) for path in [pathlib.Path('samplesmith.py'), *pathlib.Path('samplesmith_app').glob('*.py')]]"

      - name: Build SampleSmith with PyInstaller
        run: pyinstaller --noconfirm SampleSmith.spec

      - name: Create zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist/SampleSmith -DestinationPath SampleSmith-Windows.zip -Force

      - name: Upload Windows app artifact
        uses: actions/upload-artifact@v4
        with:
          name: SampleSmith-Windows
          path: SampleSmith-Windows.zip
          if-no-files-found: error
